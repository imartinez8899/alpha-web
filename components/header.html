<div class="w-full bg-[#0A1128] border-b border-slate-800 px-4 py-3 md:hidden flex items-center justify-between sticky top-0 z-50">
    
    <button onclick="navigateToHome()" class="flex items-center gap-2 focus:outline-none" aria-label="Volver al Inicio">
        <img src="/assets/img/icons/alpha-logo-white.svg" alt="Alpha Isotype" class="h-8 w-auto">
        <span class="text-white font-semibold text-lg tracking-wider font-sans">ALPHA</span>
    </button>

    <div class="flex items-center gap-4">
        
        <button onclick="navigateToAuditForm()" class="bg-[#1a365d] hover:bg-blue-900 text-white text-xs font-bold uppercase tracking-widest px-4 py-2 rounded border border-blue-400/30 transition-all duration-300 shadow-lg shadow-blue-950/50">
            Solicitar Auditoría
        </button>

        <button onclick="toggleFullscreenMenu()" class="text-slate-300 hover:text-white transition-colors duration-200 p-1" aria-label="Abrir Menú Principal">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </button>

    </div>
</div>

<script>
    /**
     * Alpha Web Infrastructure - Controlador de Navegación Semántica
     * Sustituye la lógica de índices numéricos por hitos del ciclo del cliente.
     */

    // Retorna al usuario al inicio (Hero Section / Home)
    function navigateToHome() {
        console.log("[Alpha Navigation] Ejecutando redirección estética a Home.");
        // Si usas scroll o manipulación de DOM para tu SPA:
        const homeSection = document.getElementById("hero-section");
        if (homeSection) {
            homeSection.scrollIntoView({ behavior: 'smooth' });
        } else {
            window.location.href = "/index.html";
        }
    }

    // Salto de alta conversión directo al Formulario de Zoho (Fase 1: Assessment)
    function navigateToAuditForm() {
        console.log("[Alpha Navigation] Traccionando lead hacia el Alpha Property Health Assessment.");
        const formSection = document.getElementById("lead-form-container");
        if (formSection) {
            formSection.scrollIntoView({ behavior: 'smooth' });
        } else {
            // Si el formulario reside en una sección específica indexada
            window.location.href = "/index.html#lead-form";
        }
    }

    // Control de visibilidad del menú de pantalla completa para blindaje legal o navegación corporativa
    function toggleFullscreenMenu() {
        const menuOverlay = document.getElementById("fullscreen-menu-overlay");
        if (menuOverlay) {
            menuOverlay.classList.toggle("hidden");
            console.log("[Alpha Interface] Estado del menú modificado.");
        }
    }
</script>

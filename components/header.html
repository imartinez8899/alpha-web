<!-- Componente UI: Barra de Navegación Fija Móvil (Bottom Navigation Bar) -->
<div class="fixed bottom-0 left-0 right-0 z-50 md:hidden bg-[#0A1128] border-t border-slate-800 shadow-[0_-4px_10px_rgba(0,0,0,0.3)] px-4 py-2 safe-bottom">
    <div class="flex items-center justify-between max-w-md mx-auto h-16">
        
        <!-- Elemento 1 (Izquierda): Icono Inicio -->
        <button onclick="navigateToHome()" class="flex flex-col items-center justify-center w-16 h-full text-slate-400 hover:text-white transition-colors duration-200" aria-label="Regresar al Inicio">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
            <span class="text-[10px] font-medium mt-1 tracking-wider uppercase font-sans">Inicio</span>
        </button>

        <!-- Elemento 2 (Centro): Botón Destacado en Primera Persona -->
        <div class="relative -top-4">
            <button onclick="navigateToAuditForm()" class="flex items-center justify-center bg-gradient-to-r from-amber-500 to-yellow-600 text-white font-sans font-bold text-xs uppercase tracking-widest px-5 h-14 rounded-full shadow-[0_4px_15px_rgba(245,158,11,0.4)] active:scale-95 transition-transform duration-150 border-2 border-[#0A1128]" aria-label="Comenzar Auditoría Patrimonial">
                ¡Quiero Comenzar Ya!
            </button>
        </div>

        <!-- Elemento 3 (Derecha): Icono Hamburguesa -->
        <button onclick="toggleFullscreenMenu()" class="flex flex-col items-center justify-center w-16 h-full text-slate-400 hover:text-white transition-colors duration-200" aria-label="Abrir Menú de Navegación">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
            <span class="text-[10px] font-medium mt-1 tracking-wider uppercase font-sans">Menú</span>
        </button>

    </div>
</div>

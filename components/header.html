<!--

-->
<div class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-[#0A1128] border-t border-slate-800 px-4 h-16 flex items-center justify-between safe-bottom shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
    <!-- Inicio -->
    <button onclick="navigateToHome()" class="flex flex-col items-center justify-center w-16 h-full text-white">
        <img src="/assets/img/icons/icon-home.svg" alt="Inicio" class="w-6 h-6 mb-0.5 brightness-0 invert">
        <span class="text-[9px] font-semibold tracking-widest uppercase text-slate-400">Inicio</span>
    </button>

    <!-- CTA Central -->
    <div class="flex items-center h-full">
        <button onclick="navigateToAuditForm()" class="btn-alpha-glow text-white font-bold text-[10px] uppercase tracking-widest px-5 h-10 rounded-full active:scale-95 transition-all">
            ¡Quiero Comenzar Ya!
        </button>
    </div>

    <!-- Menú (Hamburguesa) -->
    <button onclick="toggleFullscreenMenu()" class="flex flex-col items-center justify-center w-16 h-full text-white">
        <img src="/assets/img/icons/icon-menu-hamburger.svg" alt="Menú" class="w-6 h-6 mb-0.5 brightness-0 invert">
        <span class="text-[9px] font-semibold tracking-widest uppercase text-slate-400">Menú</span>

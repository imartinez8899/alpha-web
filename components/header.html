<!-- Componente UI Master: Sistema de Navegación Híbrido (Desktop & Mobile) -->
<header class="font-sans w-full">

    <!-- ========================================== -->
    <!-- ENTORNO DESKTOP: Barra Superior Inmaculada -->
    <!-- ========================================== -->
    <div class="hidden md:flex fixed top-0 left-0 right-0 z-50 bg-[#0A1128]/95 backdrop-blur-md border-b border-slate-800 shadow-lg px-8 h-20 items-center justify-between">
        
        <!-- Identidad Visual / Logotipo -->
        <div class="flex items-center space-x-2 cursor-pointer" onclick="navigateToHome()">
            <span class="font-montserrat font-bold text-white text-xl tracking-wider uppercase">
                Alpha <span class="text-amber-500 font-light">Roofing</span>
            </span>
        </div>

        <!-- Enlaces de Navegación Semántica -->
        <nav class="flex items-center space-x-8 text-xs font-medium uppercase tracking-widest text-slate-400">
            <a href="javascript:void(0)" onclick="navigateToHome()" class="hover:text-white transition-colors duration-200">Inicio</a>
            <a href="javascript:void(0)" onclick="toggleFullscreenMenu()" class="hover:text-white transition-colors duration-200">Mapa del Sitio</a>
            <a href="tel:3463702793" class="text-slate-300 hover:text-amber-500 transition-colors duration-200 font-mono tracking-normal normal-case">Oficina: 346-370-2793</a>
        </nav>

        <!-- Botón de Tracción Comercial (Centrado Verticalmente) -->
        <div class="flex items-center">
            <button onclick="navigateToAuditForm()" class="bg-gradient-to-r from-amber-500 to-yellow-600 text-white font-bold text-xs uppercase tracking-widest px-6 py-3 rounded-full shadow-[0_4px_15px_rgba(245,158,11,0.2)] hover:shadow-[0_4px_20px_rgba(245,158,11,0.4)] active:scale-95 transition-all duration-150">
                ¡Quiero Comenzar Ya!
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- ENTORNO MÓVIL: Barra Táctil Base           -->
    <!-- ========================================== -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-[#0A1128] border-t border-slate-800 shadow-[0_-4px_10px_rgba(0,0,0,0.3)] px-4 h-16 flex items-center justify-between safe-bottom">
        
        <!-- Elemento 1 (Izquierda): Icono Inicio Local -->
        <button onclick="navigateToHome()" class="flex flex-col items-center justify-center w-16 h-full text-slate-400 hover:text-white transition-colors duration-200" aria-label="Regresar al Inicio">
            <img src="/assets/img/icons/icon-home.svg" alt="Inicio" class="w-6 h-6 mb-1 opacity-70 hover:opacity-100 transition-opacity">
            <span class="text-[10px] font-medium tracking-wider uppercase">Inicio</span>
        </button>

        <!-- Elemento 2 (Centro): Botón Destacado Táctil (Centrado Verticalmente) -->
        <button onclick="navigateToAuditForm()" class="flex items-center justify-center bg-gradient-to-r from-amber-500 to-yellow-600 text-white font-bold text-[10px] uppercase tracking-widest px-5 h-10 rounded-full shadow-[0_4px_15px_rgba(245,158,11,0.4)] active:scale-95 transition-transform duration-150 border border-[#0A1128]" aria-label="Comenzar Auditoría Patrimonial">
            ¡Quiero Comenzar Ya!
        </button>

        <!-- Elemento 3 (Derecha): Icono Menú Local -->
        <button onclick="toggleFullscreenMenu()" class="flex flex-col items-center justify-center w-16 h-full text-slate-400 hover:text-white transition-colors duration-200" aria-label="Abrir Menú de Navegación">
            <img src="/assets/img/icons/icon-menu-hamburger.svg" alt="Menú" class="w-6 h-6 mb-1 opacity-70 hover:opacity-100 transition-opacity">
            <span class="text-[10px] font-medium tracking-wider uppercase">Menú</span>
        </button>
        
    </div>

</header>

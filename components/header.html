<!-- components/header.html -->
<!-- BARRA DE NAVEGACIÓN ERGONÓMICA INFERIOR (ESTILO APP NATIVA) -->
<div class="fixed bottom-0 left-0 w-full z-50 px-4 pb-4 md:hidden">
    <nav class="w-full h-16 bg-alphaNavy/95 backdrop-blur-md rounded-2xl border border-white/10 shadow-2xl flex items-center justify-between px-6 text-white">
        
        <!-- Elemento 1 (Izquierda): Botón de Inicio / Reset -->
        <button onclick="resetToScreen1()" class="flex flex-col items-center justify-center space-y-1 active:scale-95 transition-transform group" aria-label="Volver al inicio">
            <svg class="w-6 h-6 text-slate-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span class="text-[10px] tracking-wider text-slate-400 font-medium group-hover:text-blue-400 transition-colors uppercase">Inicio</span>
        </button>

        <!-- Elemento 2 (Centro): Botón Destacado en Primera Persona -->
        <button onclick="jumpToContactScreen()" class="relative -top-3 flex items-center justify-center px-5 h-12 bg-alphaBlue text-white text-xs font-bold tracking-widest uppercase rounded-xl shadow-lg shadow-alphaBlue/40 active:scale-95 transition-all transform border border-blue-500/30">
            ¡Quiero Comenzar Ya!
        </button>

        <!-- Elemento 3 (Derecha): Menú Hamburguesa / Mapa del Sitio -->
        <button onclick="toggleSitemapMenu()" class="flex flex-col items-center justify-center space-y-1 active:scale-95 transition-transform group" aria-label="Abrir mapa del sitio">
            <svg class="w-6 h-6 text-slate-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
            <span class="text-[10px] tracking-wider text-slate-400 font-medium group-hover:text-blue-400 transition-colors uppercase">Menú</span>
        </button>

    </nav>
</div>

<!-- MENÚ MODAL COMPLETO (SITEMAP HAMBURGUESA) -->
<div id="sitemap-modal" class="fixed inset-0 z-50 bg-alphaNavy bg-opacity-98 backdrop-blur-lg translate-y-full transition-transform duration-300 ease-in-out hidden flex-col justify-between p-8 text-white">
    <div class="flex items-center justify-between border-b border-white/10 pb-6">
        <img src="/assets/img/brand/alpha-logo-white.svg" alt="Alpha Logo" class="h-10 w-auto object-contain">
        <button onclick="toggleSitemapMenu()" class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <!-- Índice/Outline de Navegación Rápida -->
    <nav class="flex-1 py-12 flex flex-col justify-center space-y-6 text-center">
        <button onclick="goToScreen(1)" class="text-2xl font-bold tracking-tight hover:text-blue-400 transition-colors block">Inicio Residencial</button>
        <button onclick="goToScreen(2)" class="text-2xl font-bold tracking-tight hover:text-blue-400 transition-colors block">¿Qué necesita su hogar?</button>
        <button onclick="goToScreen(4)" class="text-2xl font-bold tracking-tight hover:text-blue-400 transition-colors block">Alpha Signature Protocol</button>
        <button onclick="goToScreen(5)" class="text-2xl font-bold tracking-tight hover:text-blue-400 transition-colors block">Prueba Social y Cobertura</button>
        <button onclick="goToScreen(6)" class="text-2xl font-bold tracking-tight hover:text-blue-400 transition-colors block text-blue-400">Canales de Contacto Directo</button>
    </nav>

    <div class="border-t border-white/10 pt-6 text-center text-xs text-slate-400 space-y-2">
        <p class="font-semibold text-white tracking-wider uppercase text-[10px]">Alpha Roofing & Gutters</p>
        <p>Spring & The Woodlands Area</p>
    </div>
</div>

<!-- LÓGICA DE CONTROL TEMPORAL DE INTERACCIONES -->
<script>
    function toggleSitemapMenu() {
        const modal = document.getElementById('sitemap-modal');
        if (modal.classList.contains('hidden')) {
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('translate-y-full'), 10);
        } else {
            modal.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }
    }

    function resetToScreen1() {
        console.log("Reset a Pantalla 1 ejecutado.");
        if(typeof swiper !== 'undefined') swiper.slideTo(0);
    }

    function jumpToContactScreen() {
        console.log("Salto directo a la Pantalla de Contacto 6 ejecutado.");
        if(typeof swiper !== 'undefined') swiper.slideTo(5);
    }

    function goToScreen(index) {
        toggleSitemapMenu();
        console.log("Navegando a pantalla index: " + (index - 1));
        if(typeof swiper !== 'undefined') swiper.slideTo(index - 1);
    }
</script>

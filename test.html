<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Roofing & Gutters - Official Logo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .official-logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px; /* Tamaño ajustable */
            padding: 40px;
        }

        /* Color azul extraído directamente de la imagen subida */
        .brand-blue {
            stroke: #253BD8;
            fill: #253BD8;
            color: #253BD8;
        }

        .text-alpha {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: 0.35em;
            margin-left: 0.35em; /* Compensa el tracking para mantener el centrado perfecto */
            margin-top: -20px;
            margin-bottom: 20px;
        }

        .text-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.45em;
            margin-left: 0.45em;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="official-logo-wrapper">
        
        <svg viewBox="0 0 800 380" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto;">
            
            <path d="M 160 240 L 160 130 L 210 130 L 210 190" 
                  class="brand-blue" 
                  stroke-width="12" 
                  stroke-linejoin="miter" 
                  stroke-linecap="butt"/>

            <path d="M 60 340 L 300 100 L 580 380" 
                  class="brand-blue" 
                  stroke-width="12" 
                  stroke-linejoin="miter" 
                  stroke-linecap="butt"/>

            <path d="M 400 170 L 470 100 L 740 370" 
                  class="brand-blue" 
                  stroke-width="12" 
                  stroke-linejoin="miter" 
                  stroke-linecap="butt"/>
        </svg>

        <div class="text-alpha brand-blue">ALPHA</div>
        <div class="text-sub brand-blue">
            ROOFING AND<br>
            GUTTERS
        </div>

    </div>

</body>
</html>

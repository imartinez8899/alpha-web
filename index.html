<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Roofing & Gutters | Expertos en Reparación de Techos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alphaNavy: '#0A1128',
                        alphaElectric: '#253BD8',
                        technicalPlatinum: '#fafafa',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body, html { height: 100%; overflow: hidden; background-color: #0A1128; }
        .view-section {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out, visibility 0.5s;
            z-index: 10;
        }
        .view-section.active { opacity: 1; visibility: visible; z-index: 20; }
        .video-overlay { background: linear-gradient(to bottom, rgba(10, 17, 40, 0.85), rgba(10, 17, 40, 0.95)); }
        
        /* Estilo Alpha Signature Glow para el Selector */
        .btn-language {
            background-color: #000000;
            color: #ffffff;
            font-weight: 700;
            border: 1px solid #253BD8;
            box-shadow: 0 0 15px rgba(37, 59, 216, 0.6);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="font-sans text-slate-900 selection:bg-alphaElectric selection:text-white">

    <!-- 🌐 SELECTOR DE IDIOMA (OVERLAY INICIAL) -->
    <div id="language-selector" class="fixed inset-0 z-[4] flex items-center justify-center bg-alphaNavy/60 backdrop-blur-md transition-opacity duration-700">
        <div class="max-w-xs w-full text-center space-y-8 p-10 bg-black/40 rounded-3xl border border-white/10 shadow-2xl">
            <img src="/assets/img/brand/alpha-logo-white.svg" alt="Alpha Logo" class="h-16 mx-auto mb-4">
            <p class="text-white text-xs font-light tracking-widest uppercase mb-6">Select your experience / Seleccione su experiencia</p>
            <div class="flex flex-col space-y-4">
                <button onclick="setLanguage('en')" class="btn-language py-4 px-8 rounded-xl text-sm tracking-[0.2em]">
                    ENGLISH
                </button>
                <button onclick="setLanguage('es')" class="btn-language py-4 px-8 rounded-xl text-sm tracking-[0.2em]">
                    ESPAÑOL
                </button>
            </div>
        </div>
    </div>

    <!-- MOTOR DE VIDEO FONDO (PARALLAX FIJO) -->
    <div class="fixed inset-0 z-0 overflow-hidden">
        <video autoplay loop muted playsinline class="w-full h-full object-cover scale-110">
            <source src="/assets/img/system-restoration/before_during_after_1.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 video-overlay"></div>
    </div>

    <!-- NAVEGACIÓN MODULAR -->
    <div id="header-container" class="relative z-50"></div>

    <div id="app-viewport" class="relative h-full w-full">
        <!-- PANTALLA 1: HERO -->
        <section id="hero-section" class="view-section active flex flex-col items-center justify-center px-6 text-center">
            <img src="/assets/img/brand/alpha-logo-white.svg" alt="Alpha Logo" class="h-20 mb-10 opacity-95">
            <h1 class="font-montserrat font-bold text-3xl md:text-5xl text-white uppercase leading-tight mb-6">
                Expertos en Reparación de Techos en Greater Houston
            </h1>
            <p class="text-slate-300 text-lg md:text-xl font-light mb-10 max-w-2xl">
                Restauramos su hogar con ingeniería de precisión, transparencia total y calidad superior.
            </p>
            <div class="flex flex-col space-y-4 w-full max-w-sm">
                <button onclick="showSection('lead-form-container')" class="btn-language py-4 px-8 rounded-full text-sm tracking-widest">
                    Necesito un Techo nuevo
                </button>
                <button onclick="showSection('filter-section')" class="bg-white/10 text-white backdrop-blur-md border border-white/20 font-semibold py-4 px-8 rounded-full uppercase text-sm tracking-widest">
                    Ver Otros Servicios
                </button>
            </div>
        </section>

        <!-- PANTALLA 2: FILTRO (OTRAS PANTALLAS CARGAN AQUÍ SEGÚN BITÁCORA) -->
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        // Lógica de persistencia de idioma
        function setLanguage(lang) {
            const overlay = document.getElementById('language-selector');
            overlay.classList.add('opacity-0');
            setTimeout(() => {
                overlay.style.display = 'none';
                if (lang === 'en') {
                    window.location.href = '/en/index.html';
                }
                // Si es 'es', simplemente cerramos el modal porque el root es español [5]
            }, 700);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Roofing & Gutters - Infraestructura de Prueba</title>
    
    <!-- Tipografías Oficiales Alpha: Inter & Montserrat (Geometría pura y legible) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN (Optimización de estilos adaptivos en celulares de Texas) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Estilos Personalizados del Repositorio Local -->
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased">

    <!-- CONTENEDOR MAESTRO: Aquí el script main.js inyectará automáticamente tu Header Móvil -->
    <div id="header-container" class="w-full"></div>

    <!-- CUERPO PRINCIPAL: Espacio en blanco riguroso inspirado en Helmut Krone -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 py-24 text-center">
        <div class="max-w-xl mx-auto space-y-4">
            <!-- Texto de verificación solicitado por Dirección General -->
            <h1 class="font-montserrat font-bold text-4xl md:text-6xl tracking-tight text-white uppercase">
                Hello World
            </h1>
            <p class="text-slate-400 font-sans text-sm md:text-base max-w-md mx-auto leading-relaxed font-light">
                Infraestructura digital modular activa. Si puedes ver la barra de navegación superior o inferior adaptiva, el sistema de inyección de JavaScript está operando en sintonía perfecta con el espejo de GitHub.
            </p>
        </div>
    </main>

    <!-- Scripts de Controladores y Lógica Local -->
    <script src="/assets/js/main.js"></script>
    
    <script>
        // Inicialización y logs técnicos para auditoría de consola en producción móvil
        document.addEventListener("DOMContentLoaded", function() {
            console.log("[Alpha Core] Entorno de prueba 'Hello World' desplegado correctamente.");
        });
    </script>
</body>
</html>

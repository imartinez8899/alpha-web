<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Roofing & Gutters | Expertos en Reparación de Techos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alphaNavy: '#0A1128',
                        alphaElectric: '#253BD8',
                        technicalPlatinum: '#fafafa',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body, html { height: 100%; overflow: hidden; background-color: #0A1128; }
        
        #language-selector { z-index: 9999 !important; display: flex; pointer-events: auto; }
        #language-selector.inactive { pointer-events: none; opacity: 0; visibility: hidden; }

        .btn-alpha-glow {
            background-color: #000000 !important;
            color: #ffffff !important;
            font-weight: 700 !important;
            border: 1px solid #253BD8 !important;
            box-shadow: 0 0 15px rgba(37, 59, 216, 0.6) !important;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .view-section {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out, visibility 0.5s;
            z-index: 10;
        }
        .view-section.active { opacity: 1; visibility: visible; z-index: 20; }
        .video-overlay { background: linear-gradient(to bottom, rgba(10, 17, 40, 0.85), rgba(10, 17, 40, 0.95)); }
        
        /* Animación para el Menú Fullscreen */
        #fullscreen-menu-overlay.hidden { opacity: 0; pointer-events: none; }
        #fullscreen-menu-overlay { transition: opacity 0.4s ease-in-out; }
    </style>
</head>
<body class="font-sans text-slate-900 selection:bg-alphaElectric selection:text-white">

    <!-- 🌐 SELECTOR DE IDIOMA -->
    <div id="language-selector" class="fixed inset-0 flex items-center justify-center bg-alphaNavy/70 backdrop-blur-2xl transition-all duration-700">
        <div class="max-w-xs w-full text-center space-y-8 p-10 bg-black/50 rounded-3xl border border-white/10 shadow-2xl">
            <img src="/assets/img/brand/alpha-logo-white.svg" alt="Alpha Logo" class="h-16 mx-auto">
            <p class="text-white text-[10px] font-light tracking-[0.2em] uppercase mb-6 text-center">Select Experience / Seleccione Experiencia</p>
            <div class="flex flex-col space-y-4">
                <button onclick="setLanguage('en')" class="btn-alpha-glow py-4 px-8 rounded-xl text-xs">ENGLISH</button>
                <button onclick="setLanguage('es')" class="btn-alpha-glow py-4 px-8 rounded-xl text-xs">ESPAÑOL</button>
            </div>
        </div>
    </div>

    <!-- 📱 MENÚ FULLSCREEN (ACTIVADO) -->
    <div id="fullscreen-menu-overlay" class="hidden fixed inset-0 z-[6] bg-alphaNavy/95 backdrop-blur-xl flex flex-col items-center justify-center">
        <div class="text-center space-y-8">
            <h3 class="text-white font-montserrat font-bold text-2xl uppercase tracking-widest border-b border-alphaElectric pb-4">Mapa del Sitio</h3>
            <nav class="flex flex-col space-y-6 text-lg text-slate-300 font-sans uppercase tracking-widest">
                <button onclick="showSection('hero-section'); toggleFullscreenMenu();" class="hover:text-white transition-colors">Inicio</button>
                <button onclick="showSection('protocol-section'); toggleFullscreenMenu();" class="hover:text-white transition-colors">Alpha Signature Protocol</button>
                <button onclick="showSection('trust-section'); toggleFullscreenMenu();" class="hover:text-white transition-colors">Zonas de Cobertura</button>
                <button onclick="window.location.href='about.html'" class="hover:text-white transition-colors">Sobre Nosotros</button>
            </nav>
            <button onclick="toggleFullscreenMenu()" class="mt-8 text-[10px] text-alphaElectric border border-alphaElectric/30 px-8 py-3 uppercase tracking-[0.2em] rounded-full hover:bg-alphaElectric/10 transition-all">Cerrar Menú</button>
        </div>
    </div>

    <!-- MOTOR DE VIDEO FONDO -->
    <div class="fixed inset-0 z-0 overflow-hidden">
        <video autoplay loop muted playsinline class="w-full h-full object-cover scale-110">
            <source src="/assets/img/system-restoration/before_during_after_1.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 video-overlay"></div>
    </div>

    <!-- NAVEGACIÓN MODULAR -->
    <div id="header-container" class="relative z-50"></div>

    <div id="app-viewport" class="relative h-full w-full">
        
        <!-- 📱 PANTALLA 1: EL GANCHO DE AUTORIDAD (UI LIFTED) -->
        <section id="hero-section" class="view-section active flex flex-col items-center justify-center px-6 text-center pt-8">
            <img src="/assets/img/brand/alpha-logo-white.svg" alt="Alpha Logo" class="h-16 mb-6 opacity-95">
            <h1 class="font-montserrat font-bold text-2xl md:text-5xl text-white uppercase leading-tight mb-4 text-center">
                Expertos en Reparación de Techos en Greater Houston
            </h1>
            <p class="text-slate-300 text-base md:text-xl font-light mb-8 max-w-2xl text-center leading-relaxed">
                Restauramos su hogar con ingeniería de precisión, transparencia total y calidad superior.
            </p>
            <div class="flex flex-col space-y-3 w-full max-w-sm">
                <button onclick="showSection('lead-form-container')" class="btn-alpha-glow py-4 px-8 rounded-full text-xs">Necesito un techo nuevo</button>
                <button onclick="showSection('filter-section')" class="bg-white/10 text-white backdrop-blur-md border border-white/20 font-semibold py-4 px-8 rounded-full uppercase text-[10px] tracking-widest active:scale-95 transition-all">Ver otros Servicios</button>
                <button onclick="window.location.href='about.html'" class="bg-transparent text-white/60 font-medium py-2 px-8 uppercase text-[9px] tracking-[0.2em] hover:text-white transition-colors text-center">Conocer más sobre Alpha Roofing & Gutters</button>
            </div>
        </section>
        
        <!-- Resto de secciones mantenidas según v16.5.0 -->
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
        function setLanguage(lang) {
            const overlay = document.getElementById('language-selector');
            overlay.classList.add('inactive');
            setTimeout(() => {
                if (lang === 'en') window.location.href = '/en/index.html';
                else initAlphaNavigation();
            }, 700);
        }
    </script>
</body>
</html>

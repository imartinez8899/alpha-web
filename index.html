    <script>
        function setLanguage(lang) {
            const overlay = document.getElementById('language-selector');
            overlay.classList.add('inactive'); // Desactiva pointer-events
            setTimeout(() => {
                overlay.style.display = 'none';
                if (lang === 'en') {
                    window.location.href = '/en/index.html';
                } else {
                    if (typeof initAlphaNavigation === 'function') {
                        initAlphaNavigation();
                    }
                }
            }, 700);
        }

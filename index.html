<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Alpha Roofing & Gutters - Consultoría técnica y restauración patrimonial de élite en Spring, TX.">
    <title>Alpha Roofing & Gutters | The Alpha Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        alphaNavy: '#1a365d',
                        alphaElectric: '#253BD8',
                        alphaGray: '#fafafa'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-alphaGray font-sans text-slate-900">

    <div id="header-container"></div>

    <main>
        <section class="relative min-h-[90vh] flex items-center bg-alphaNavy">
            <div class="absolute inset-0 z-0">
                <img src="assets/img/hero/hero-bg.webp" alt="Arquitectura Alpha" class="w-full h-full object-cover brightness-[0.3]">
            </div>

            <div class="container mx-auto px-6 relative z-10 grid lg:grid-cols-2 gap-16 items-center pt-20">
                
                <div class="text-white space-y-8">
                    <img src="assets/img/brand/alpha-logo-white.svg" alt="Alpha Roofing" class="w-72">
                    <h1 class="text-5xl md:text-6xl font-bold leading-tight">
                        La belleza es la estructura <br>
                        <span class="text-alphaElectric italic">hecha visible.</span>
                    </h1>
                    <p class="text-lg md:text-xl text-slate-200 font-light border-l-4 border-alphaElectric pl-6">
                        No solo instalamos techos; blindamos su patrimonio. Consultoría técnica de alta precisión para propietarios que exigen excelencia.
                    </p>
                    <div class="flex gap-4">
                        <a href="#contacto" class="bg-alphaElectric hover:bg-blue-700 text-white px-8 py-4 font-bold uppercase tracking-widest transition">
                            Auditoría Patrimonial
                        </a>
                    </div>
                </div>

                <div class="bg-white p-2 shadow-2xl border-t-8 border-alphaElectric">
                    <div class="p-8">
                        <h2 class="text-2xl font-bold text-alphaNavy mb-6 uppercase tracking-wider">Solicitar Evaluación</h2>
                        <div id="lead-form-container">
                            </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script>
        // Carga rápida de componentes
        fetch('components/header.html').then(r => r.text()).then(html => document.getElementById('header-container').innerHTML = html);
        fetch('components/footer.html').then(r => r.text()).then(html => document.getElementById('footer-container').innerHTML = html);
        fetch('components/lead-form.html').then(r => r.text()).then(html => document.getElementById('lead-form-container').innerHTML = html);
    </script>
</body>
</html>
